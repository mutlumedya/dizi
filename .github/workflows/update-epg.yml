


name: Update EPG Data
on:
  schedule:
    - cron: '0 * * * *' # Her saat başı çalışır
  workflow_dispatch:    # Manuel test için

permissions:
  contents: write # 1782754954237.jpeg dosyasındaki hatayı almamak için gerekli

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
        
      - name: Run EPG Bot
        run: python bot.py
        
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/epg.json
          # Değişiklik varsa commit at, yoksa işlemi sessizce bitir
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update EPG Data" && git push)
